<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Editar Item — Comanda #{{ comanda.id }}</title>
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-warning">
        <div class="container-fluid">
            <div class="d-flex align-items-center gap-2">
                <a href="/">
                    <img src="/static/img/logo_espetinho.png" alt="Logo" width="40" height="40">
                </a>
                <h1 class="fs-4 mb-0">
                    <a href="/" class="text-decoration-none text-dark fw-bold">Flask Espetinho</a>
                </h1>
            </div>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="btn btn-primary" href="/produtos">Produtos</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- FLASH MESSAGES -->
    {% for categoria, mensagem in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{ categoria }} alert-dismissible fade show mb-0">
            {{ mensagem }}
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}

    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="text-center mb-4">Editar item — Comanda #{{ comanda.id }}</h3>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Produto</label>
                        <input type="text" class="form-control" value="{{ item.nome }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Valor unitário</label>
                        <input type="text" class="form-control"
                               value="R$ {{ '%.2f'|format(item.valor_unitario | float) }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Quantidade</label>
                        <input type="number" name="quantidade" class="form-control"
                               min="1" value="{{ item.quantidade }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subtotal atual</label>
                        <input type="text" class="form-control"
                               value="R$ {{ '%.2f'|format(item.subtotal | float) }}" disabled>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Atualizar item</button>
                        <a href="{{ url_for('detalhe_comanda', id=comanda.id) }}" class="btn btn-secondary">Voltar</a>
                        <a href="{{ url_for('apagar_item', comanda_id=comanda.id, item_id=item.id) }}"
                           class="btn btn-danger">Apagar item</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
