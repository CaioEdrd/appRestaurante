<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <title>Editar Produto</title>
</head>

<body class="container mt-4">

    <nav class="navbar navbar-expand-lg bg-body-tertiary" style="background-color: var(--bs-primary);">
        <div class="container-fluid">
            <div style="display: flex; align-items: center; padding-left: 20px;">
            <a class="navbar" href="/">
            <img src="/static/img/logo_espetinho.png" alt="Logo" width="40" height="40" class="d-inline-block align-text-top">
            </a>
            <h1><a href="/" style="color: #000; text-decoration: none; margin-left: 5px;"> Flask Espetinho</a></h1>
            </div>
        </div>
    </nav>

    <div class="card shadow">
        <div class="card-body">
            <h3 class="text-center mb-4">
                Editar item da comanda # {{ comanda.id }}
            </h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Produto</label>
                    <input type="text" class="form-control" value="{{ item.nome }}" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Valor unitário</label>
                    <input type="text" class="form-control" value="R$ {{ item.valor_unitario }}" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantidade</label>
                    <input type="number" name="quantidade" class="form-control" min="1" value="{{ item.quantidade }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Subtotal atual</label>
                    <input type="text" class="form-control" value="R$ {{ item.subtotal }}" disabled>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Atualizar item</button>

                    <a href="{{ url_for('detalhe_comanda', id=comanda.id) }}" class="btn btn-secondary">Voltar</a>

                    <a href="{{ url_for('apagar_item', comanda_id = comanda.id, produto_id=item.produto_id)}}" class="btn btn-danger">Apagar item</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
